<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCVLD Central License Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080710;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #00f0ff;
            --secondary: #ff007f;
            --text-color: #ffffff;
            --text-muted: #8a8d93;
            --success: #39ff14;
            --warning: #ffb703;
            --error: #ff2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ambient background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            pointer-events: none;
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
        }

        .logo-section p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-config {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .auth-config input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 8px;
            color: var(--text-color);
            outline: none;
            width: 250px;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .auth-config input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: var(--text-color);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 240, 255, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        main {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px 40px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .panel-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 25px;
            position: relative;
            padding-left: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .panel-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 18px;
            background: var(--primary);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input, .form-group select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            color: var(--text-color);
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.15);
        }

        .device-table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 15px;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
            transition: background 0.3s ease;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
        }

        .badge-active {
            background: rgba(57, 255, 20, 0.15);
            color: var(--success);
            border: 1px solid rgba(57, 255, 20, 0.3);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.1);
        }

        .badge-inactive {
            background: rgba(255, 42, 42, 0.15);
            color: var(--error);
            border: 1px solid rgba(255, 42, 42, 0.3);
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.2);
        }

        .btn-action.btn-delete:hover {
            border-color: var(--error);
            color: var(--error);
            box-shadow: 0 0 8px rgba(255, 42, 42, 0.2);
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(10, 10, 20, 0.9);
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            padding: 15px 25px;
            border-radius: 10px;
            color: var(--text-color);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 7, 16, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 240, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <header>
        <div class="logo-section">
            <h1>CCVLD Central</h1>
            <p>Hệ thống Quản lý Bản quyền Web-based</p>
        </div>
        <div class="auth-config">
            <input type="password" id="gitToken" placeholder="GitHub Personal Token (PAT)">
            <button class="btn" onclick="saveToken()">Kết nối</button>
        </div>
    </header>

    <main>
        <div class="panel">
            <h2 class="panel-title">Thêm Thiết Bị</h2>
            <form id="deviceForm" onsubmit="addDevice(event)">
                <div class="form-group">
                    <label for="hwid">Mã HWID Thiết Bị</label>
                    <input type="text" id="hwid" required placeholder="Ví dụ: 3796731232">
                </div>
                <div class="form-group">
                    <label for="note">Tên / Ghi chú</label>
                    <input type="text" id="note" required placeholder="Tên khách hàng, máy...">
                </div>
                <div class="form-group">
                    <label for="status">Trạng thái ban đầu</label>
                    <select id="status">
                        <option value="active">Active (Kích hoạt)</option>
                        <option value="inactive">Inactive (Tạm khóa)</option>
                    </select>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Lưu Thiết Bị</button>
            </form>
        </div>

        <div class="panel">
            <h2 class="panel-title">Danh Sách Thiết Bị Kích Hoạt</h2>
            <div class="device-table-container">
                <table id="deviceTable">
                    <thead>
                        <tr>
                            <th>HWID</th>
                            <th>Ghi chú</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="deviceTableBody">
                        <tr>
                            <td colspan="5" class="empty-state">Vui lòng nhập GitHub Token và nhấp Kết nối để tải dữ liệu.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        const owner = "3122380192";
        const repo = "CCVLD";
        const path = "licenses.json";
        
        let licensesData = [];
        let fileSha = "";

        // Load token from storage on load
        window.addEventListener('load', () => {
            const savedToken = localStorage.getItem('git_pat');
            if (savedToken) {
                document.getElementById('gitToken').value = savedToken;
                loadLicenses();
            }
        });

        function saveToken() {
            const token = document.getElementById('gitToken').value.trim();
            if (token) {
                localStorage.setItem('git_pat', token);
                showToast("Đã lưu token thành công!");
                loadLicenses();
            } else {
                showToast("Vui lòng nhập token hợp lệ.");
            }
        }

        function getHeaders() {
            const token = localStorage.getItem('git_pat');
            return {
                "Authorization": `token ${token}`,
                "Accept": "application/vnd.github.v3+json",
                "Content-Type": "application/json"
            };
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        async function loadLicenses() {
            const token = localStorage.getItem('git_pat');
            if (!token) return;

            showLoading(true);
            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    headers: getHeaders()
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        // File doesn't exist, we will create it when first device added
                        licensesData = [];
                        fileSha = "";
                        renderTable();
                        showToast("Chưa có cơ sở dữ liệu. Nhập thiết bị đầu tiên để khởi tạo.");
                        return;
                    }
                    throw new Error("Lỗi khi tải file từ GitHub.");
                }

                const data = await response.json();
                fileSha = data.sha;
                const content = atob(data.content.replace(/\s/g, ''));
                licensesData = JSON.parse(content);
                renderTable();
                showToast("Đã tải danh sách thiết bị!");
            } catch (err) {
                console.error(err);
                showToast("Lỗi kết nối GitHub. Vui lòng kiểm tra Repo hoặc Token.");
            } finally {
                showLoading(false);
            }
        }

        function renderTable() {
            const body = document.getElementById('deviceTableBody');
            body.innerHTML = '';

            if (licensesData.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="empty-state">Không có thiết bị nào được kích hoạt.</td></tr>';
                return;
            }

            licensesData.forEach((device, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${device.hwid}</strong></td>
                    <td>${device.note}</td>
                    <td><span class="badge ${device.status === 'active' ? 'badge-active' : 'badge-inactive'}">${device.status}</span></td>
                    <td style="color: var(--text-muted); font-size: 0.85rem;">${device.created_at || 'N/A'}</td>
                    <td class="actions">
                        <button class="btn-action" onclick="toggleStatus(${index})">Khóa/Mở</button>
                        <button class="btn-action btn-delete" onclick="deleteDevice(${index})">Xóa</button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        async function saveToGitHub(message) {
            showLoading(true);
            try {
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(licensesData, null, 2))));
                const body = {
                    message: message,
                    content: content
                };
                if (fileSha) {
                    body.sha = fileSha;
                }

                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    method: 'PUT',
                    headers: getHeaders(),
                    body: JSON.stringify(body)
                });

                if (!response.ok) {
                    throw new Error("Lỗi lưu file lên GitHub.");
                }

                const resData = await response.json();
                fileSha = resData.content.sha;
                showToast("Đã đồng bộ lên GitHub thành công!");
                renderTable();
            } catch (err) {
                console.error(err);
                showToast("Lỗi khi đồng bộ lên GitHub.");
            } finally {
                showLoading(false);
            }
        }

        function addDevice(e) {
            e.preventDefault();
            const hwid = document.getElementById('hwid').value.trim();
            const note = document.getElementById('note').value.trim();
            const status = document.getElementById('status').value;

            if (licensesData.some(d => d.hwid === hwid)) {
                showToast("Mã HWID này đã tồn tại!");
                return;
            }

            const newDevice = {
                hwid: hwid,
                note: note,
                status: status,
                created_at: new Date().toISOString().split('T')[0]
            };

            licensesData.push(newDevice);
            document.getElementById('deviceForm').reset();
            saveToGitHub(`Add device ${hwid} (${note})`);
        }

        function toggleStatus(index) {
            const device = licensesData[index];
            device.status = device.status === 'active' ? 'inactive' : 'active';
            saveToGitHub(`Toggle status for ${device.hwid} to ${device.status}`);
        }

        function deleteDevice(index) {
            if (confirm("Bạn có chắc chắn muốn xóa thiết bị này không?")) {
                const device = licensesData[index];
                licensesData.splice(index, 1);
                saveToGitHub(`Delete device ${device.hwid}`);
            }
        }
    </script>
</body>
</html>
